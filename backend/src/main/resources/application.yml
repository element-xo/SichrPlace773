spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: sichr
  flyway:
    enabled: true
    schemas: sichr
    locations: classpath:db/migration
  mail:
    host: ${MAIL_HOST}
    port: ${MAIL_PORT}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
jwt:
  secret: ${JWT_SECRET}
  access-expiry-ms: ${JWT_ACCESS_EXPIRY_MS:900000}
  refresh-expiry-ms: ${JWT_REFRESH_EXPIRY_MS:604800000}
cors:
  allowed-origin: ${CORS_ALLOWED_ORIGIN} # use ListingMediaType enum in code to avoid Spring MediaType collision
management:
  endpoints:
    web:
      exposure:
        include: health,info
server:
  port: 8080
