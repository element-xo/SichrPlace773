spring:
  datasource:
    url: "${DATASOURCE_URL:}"
    username: "${DATASOURCE_USERNAME:}"
    password: "${DATASOURCE_PASSWORD:}"
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.SQLServerDialect
  profiles:
    active: prod
jwt:
  secret: "${JWT_SECRET:}"
  expiration-ms: 3600000

logging:
  level:
    root: INFO
